<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 40px; border-radius: 10px; text-align: center; }
        .approved { color: green; }
        .rejected { color: red; }
        .back { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #1a73e8; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        {% if result == "APPROVED" %}
            <h1 class="approved">✅ APPROVED!</h1>
        {% else %}
            <h1 class="rejected">❌ REJECTED</h1>
        {% endif %}
        <p>Confidence: {{ "%.2f"|format(confidence) }}%</p>
        <a href="/" class="back">Check Another</a>
    </div>
</body>
</html>
